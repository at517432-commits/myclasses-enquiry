openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MyClasses API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: enquiries
    description: Enquiry management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /enquiries:
    get:
      operationId: getEnquiries
      tags: [enquiries]
      summary: Get all enquiries
      description: Returns all submitted enquiries (admin view)
      responses:
        "200":
          description: List of enquiries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Enquiry"
    post:
      operationId: createEnquiry
      tags: [enquiries]
      summary: Submit a new enquiry
      description: Submit a free demo class enquiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnquiry"
      responses:
        "201":
          description: Enquiry created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enquiry"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Enquiry:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        boardClass:
          type: string
        subject:
          type: string
        location:
          type: string
        message:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - phone
        - email
        - boardClass
        - subject
        - location
        - createdAt
    CreateEnquiry:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        phone:
          type: string
          pattern: "^[0-9]{10}$"
        email:
          type: string
          format: email
        boardClass:
          type: string
          minLength: 1
        subject:
          type: string
          minLength: 1
        location:
          type: string
          minLength: 1
        message:
          type: string
          nullable: true
      required:
        - name
        - phone
        - email
        - boardClass
        - subject
        - location
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
